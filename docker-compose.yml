x-logging: &loki-logging
  driver: json-file
  options:
    tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

services:
  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yaml:/mnt/config/loki-config.yaml
    command: -config.file=/mnt/config/loki-config.yaml
    logging: *loki-logging  

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./config/loki/promtail-config.yaml:/mnt/config/promtail-config.yaml
      - /var/lib/docker/containers:/host/containers
    command: -config.file /mnt/config/promtail-config.yaml
    logging: *loki-logging

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    volumes: 
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/:/etc/grafana/provisioning/
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-testloki}
    logging: *loki-logging

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    logging: *loki-logging

  tempo:
    image: grafana/tempo:2.4.1
    command: -config.file=/etc/tempo.yml
    ports:
      - "3200:3200"  # HTTP API
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo.yml
      - tempo-data:/var/tempo
    logging: *loki-logging

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-passw123}
      POSTGRES_DB: ${POSTGRES_DB:-messages_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *loki-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true
    logging: *loki-logging

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: 'rabbitmq'
    ports:
        - 5672:5672
        - 15672:15672
    healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
        interval: 30s
        timeout: 10s
        retries: 5
    volumes:
        - ~/.docker-conf/rabbitmq/data/:/var/lib/rabbitmq/
        - ~/.docker-conf/rabbitmq/log/:/var/log/rabbitmq
    environment:
        - RABBITMQ_DEFAULT_USER=admin
        - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-passw123}

  api-rest:
    build:
      context: ~/Developer/python-api
      dockerfile: Dockerfile
    ports: 
        - "5000:5000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-passw123}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-messages_db}
      - TEMPO_ENDPOINT=http://tempo:4317
    restart: on-failure
    logging: *loki-logging

  consumer:
    build:
      context: ~/Developer/python-api
      dockerfile: Dockerfile
    command: ["python", "consumer.py"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-passw123}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-messages_db}
      - TEMPO_ENDPOINT=http://tempo:4317
    restart: on-failure
    logging: *loki-logging

volumes:
  grafana-data:
  tempo-data:
  postgres-data:


